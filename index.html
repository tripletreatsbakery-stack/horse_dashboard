<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Dashboard</title>
</head>
<body>
    <h1>Welcome to Horse Dashboard</h1>
    <form id="wager-form">
        <label for="wager">Enter your wager:</label>
        <input type="text" id="wager" name="wager" required>
        <button type="submit">Save Wager</button>
    </form>
    <script>
        document.getElementById('wager-form').onsubmit = async function(event) {
            event.preventDefault();
            const wager = document.getElementById('wager').value;
            const response = await fetch('https://script.google.com/macros/s/AKfycbzAqAH69rI7JqyvmFlkmpjixQRO4h9xht8kzgmAWyHNm33UA9Y4CadJ6qEf77sKp2Co/exec', {
                method: 'POST',
                body: JSON.stringify({ wager }),
                headers: {
                    'Content-Type': 'application/json'
                }
            });
            if (response.ok) {
                alert('Wager saved successfully!');
            } else {
                alert('Error saving wager.');
            }
        };
    </script>
</body>
</html>
