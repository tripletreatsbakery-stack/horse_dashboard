<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Horse Wagers</title>

<style>

body{
font-family: Arial;
margin:20px;
background:#f5f5f5;
}

h2{
margin-bottom:10px;
}

select{
padding:6px;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

.wager-group label{
margin-right:10px;
}

</style>

</head>

<body>

<h2>Wager Dashboard</h2>

<label>Select Race:</label>
<select id="raceSelector"></select>

<table id="table">
<thead>
<tr>
<th>Program</th>
<th>Horse</th>
<th>Morning Line</th>
<th>Wager</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQFTzUi9G0XRrPHJNSAoN7y6Ik5rQe21n9QUjjU-xkBxJw1IGJJ7nIGUnSTLPJnkbUrQ2jZVGLHGfWo/pub?output=csv";

let data = [];

async function loadSheet(){

const response = await fetch(sheetURL);
const text = await response.text();

const rows = text.trim().split("\n");
const headers = rows[0].split(",");

data = rows.slice(1).map(r=>{
const cols=r.split(",");
let obj={};
headers.forEach((h,i)=> obj[h]=cols[i]);
return obj;
});

populateRaceSelector();

}

function populateRaceSelector(){

const races=[...new Set(data.map(d=>d.race_id))];

const selector=document.getElementById("raceSelector");

races.forEach(r=>{
const opt=document.createElement("option");
opt.value=r;
opt.text=r;
selector.appendChild(opt);
});

selector.addEventListener("change", renderTable);

renderTable();

}

function renderTable(){

const race=document.getElementById("raceSelector").value;

const filtered=data.filter(d=>d.race_id===race);

const body=document.getElementById("body");

body.innerHTML="";

filtered.forEach(h=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${h.program_number}</td>
<td>${h.horse_name}</td>
<td>${h.morning_line}</td>

<td class="wager-group">

<label>
<input type="radio" name="${h.race_id}_${h.program_number}" value="win">
Win
</label>

<label>
<input type="radio" name="${h.race_id}_${h.program_number}" value="place">
Place
</label>

<label>
<input type="radio" name="${h.race_id}_${h.program_number}" value="show">
Show
</label>

</td>
`;

body.appendChild(tr);

});

}

loadSheet();

</script>

</body>
</html>
