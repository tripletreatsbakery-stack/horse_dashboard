<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Horse Wagers</title>

<style>

body{
font-family: Arial;
margin:20px;
background:#f5f5f5;
}

h2{
margin-bottom:10px;
}

select{
padding:6px;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

.wager-group label{
margin-right:10px;
}

tr.selected{
background:#90EE90 !important;
}

</style>

</head>

<body>

<h2>Wager Dashboard</h2>

<label>Select Race:</label>
<select id="raceSelector"></select>

<table id="table">
<thead>
<tr>
<th>Wagers</th>
<th>Race #</th>
<th>Program</th>
<th>Horse Name</th>
<th>Morning Line</th>
<th>Jockey Win %</th>
<th>Avg Speed (Last 3)</th>
<th>3 Parts Average</th>
<th>Avg E1 (Last 3)</th>
<th>Avg E2 (Last 3)</th>
<th>Avg Late (Last 3)</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQFTzUi9G0XRrPHJNSAoN7y6Ik5rQe21n9QUjjU-xkBxJw1IGJJ7nIGUnSTLPJnkbUrQ2jZVGLHGfWo/pub?output=csv";

let data = [];

async function loadSheet(){

const response = await fetch(sheetURL);
const text = await response.text();

const rows = text.trim().split("\n");
const headers = rows[0].split(",");

data = rows.slice(1).map(r=>{
const cols=r.split(",");
let obj={};
headers.forEach((h,i)=> obj[h.trim()]=cols[i] ? cols[i].trim() : "");
return obj;
});

populateRaceSelector();

}

function populateRaceSelector(){

const races=[...new Set(data.map(d=>d.race_id))];

const selector=document.getElementById("raceSelector");

races.forEach(r=>{
const opt=document.createElement("option");
opt.value=r;
opt.text=r;
selector.appendChild(opt);
});

selector.addEventListener("change", renderTable);

renderTable();

}

function renderTable(){

const race=document.getElementById("raceSelector").value;

const filtered=data.filter(d=>d.race_id===race);

const body=document.getElementById("body");

body.innerHTML="";

filtered.forEach(h=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td class="wager-group">
<label><input type="checkbox" class="wager" data-type="W"> W</label>
<label><input type="checkbox" class="wager" data-type="P"> P</label>
<label><input type="checkbox" class="wager" data-type="S"> S</label>
</td>
<td>${h.race_number || ''}</td>
<td>${h.program_num || ''}</td>
<td>${h.horse_name || ''}</td>
<td>${h.morning_line || ''}</td>
<td>${h.jockey_win_pct || ''}</td>
<td>${h.avg_speed_last3 || ''}</td>
<td>${h['3_parts_average'] || ''}</td>
<td>${h.avg_e1_last3 || ''}</td>
<td>${h.avg_e2_last3 || ''}</td>
<td>${h.avg_late_last3 || ''}</td>
`;

body.appendChild(tr);

/* highlight entire row when any wager is selected */

const boxes = tr.querySelectorAll(".wager");

boxes.forEach(b=>{
b.addEventListener("change", ()=>{
const anyChecked=[...boxes].some(x=>x.checked);

if(anyChecked){
tr.classList.add("selected");
}else{
tr.classList.remove("selected");
}
});
});

});

}

loadSheet();

</script>

</body>
</html>
