<!DOCTYPE html>
<html>

<head>

<title>Ampa's Wager Tracker</title>

<style>

body{
font-family:Arial;
margin:20px;
background-image:url("https://images.unsplash.com/flagged/photo-1569319388901-605a6d2d1299?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
background-size:cover;
background-attachment:fixed;
background-position:center;
color:white;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,40,0,0.65);
z-index:0;
}

body > *{
position:relative;
z-index:1;
}

h2{
margin-bottom:10px;
color:#FFD700;
}

/* BALANCE CARDS */

.balance-container{
display:flex;
gap:15px;
margin-bottom:20px;
}

.balance-card{
flex:1;
background:rgba(255,255,255,0.95);
padding:14px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
color:black;
}

.balance-label{
font-size:12px;
letter-spacing:1px;
color:#666;
text-transform:uppercase;
}

.balance-value{
font-size:26px;
font-weight:bold;
margin-top:4px;
}

.positive{
color:#0a8f2a;
}

.negative{
color:#c0392b;
}

/* Dropdown */

select{
padding:6px;
margin-bottom:15px;
background:#0b3d0b;
color:white;
border:1px solid #FFD700;
}

/* Table */

table{
border-collapse:collapse;
width:100%;
background:rgba(255,255,255,0.95);
color:black;
border-radius:6px;
overflow:hidden;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#0b3d0b;
color:#FFD700;
cursor:pointer;
}

tr:hover{
background:#eef6ff;
}

.selected{
background:#c8f7c5 !important;
font-weight:bold;
}

.ticket{
margin-top:20px;
padding:12px;
background:rgba(255,255,255,0.95);
color:black;
border-radius:6px;
border-left:6px solid #FFD700;
}

.ticket h3{
margin-top:0;
}

</style>
</head>

<body>
<div style="max-width:1200px;margin:auto">

<h2>Ampa's Wagers</h2>

<div class="balance-container">

<div class="balance-card">
<div class="balance-label">Balance</div>
<div id="balanceValue" class="balance-value">$0</div>
</div>

<div class="balance-card">
<div class="balance-label">Deposit</div>
<div id="depositValue" class="balance-value">$0</div>
</div>

<div class="balance-card">
<div class="balance-label">Net</div>
<div id="netValue" class="balance-value">$0</div>
</div>

</div>

<select id="raceSelector"></select>

<table id="table">

<thead>
<tr id="header"></tr>
</thead>

<tbody id="body"></tbody>

</table>

<div class="ticket">

<h3>Bet Ticket</h3>
<div id="ticket"></div>

</div>

<script>

const balanceURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQFTzUi9G0XRrPHJNSAoN7y6Ik5rQe21n9QUjjU-xkBxJw1IGJJ7nIGUnSTLPJnkbUrQ2jZVGLHGfWo/pub?gid=947430458&single=true&output=csv";

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQFTzUi9G0XRrPHJNSAoN7y6Ik5rQe21n9QUjjU-xkBxJw1IGJJ7nIGUnSTLPJnkbUrQ2jZVGLHGfWo/pub?output=csv";

const saveURL =
"https://script.google.com/macros/s/AKfycbzNV1ga5VDm5iRGjwC4PrSoU9uPBmlvRhzAm8G3xIuFbhQIKSnlcsN57sepmw49mALC/exec";

let data=[];
let headers=[];
let currentRace="";
let ticket=[];

/* LOAD BALANCE */

async function loadBalance(){

const res = await fetch(balanceURL);
const text = await res.text();

const rows = text.trim().split("\n");
const cols = rows[1].split(",");

const deposit = parseFloat(cols[0].replace("$",""));
const net = parseFloat(cols[1].replace("$",""));
const balance = parseFloat(cols[2].replace("$",""));

document.getElementById("balanceValue").innerText="$"+balance;
document.getElementById("depositValue").innerText="$"+deposit;
document.getElementById("netValue").innerText="$"+net;

if(balance>=0){
document.getElementById("balanceValue").classList.add("positive");
}else{
document.getElementById("balanceValue").classList.add("negative");
}

if(net>=0){
document.getElementById("netValue").classList.add("positive");
}else{
document.getElementById("netValue").classList.add("negative");
}

}

/* LOAD HORSES */

async function loadSheet(){

const res=await fetch(sheetURL);
const text=await res.text();

const rows=text.trim().split("\n");

headers=rows[0].split(",");

rows.slice(1).forEach(r=>{

const cols=r.split(",");

let obj={};

headers.forEach((h,i)=>{
obj[h]=cols[i];
});

data.push(obj);

});

populateRaceSelector();
buildHeader();

}

/* RACE SELECTOR */

function populateRaceSelector(){

const races=[...new Set(data.map(d=>d.race_number))].sort();

const sel=document.getElementById("raceSelector");

races.forEach(r=>{

const opt=document.createElement("option");

opt.value=r;
opt.text="Race "+r;

sel.appendChild(opt);

});

sel.addEventListener("change",()=>{

currentRace=sel.value;
renderTable();

});

currentRace=races[0];
sel.value=currentRace;

renderTable();

}

/* HEADER */

function buildHeader(){

const head=document.getElementById("header");

head.innerHTML="<th>W</th><th>P</th><th>S</th>";

const headerMap={
prime_bucket:"Class",
program_number:"#",
horse_name:"Horse",
morning_line:"Odds",
avg_speed_last3:"Speed",
avg_e1_last3:"E1",
avg_e2_last3:"E2",
avg_late_last3:"Late",
avg_pace_score:"Pace"
};

headers.forEach(h=>{

if(h==="race_number"||h==="race_id") return;

const th=document.createElement("th");
th.innerText=headerMap[h]||h;

head.appendChild(th);

});

}

/* TABLE */

function renderTable(){

const body=document.getElementById("body");

body.innerHTML="";

const filtered=data.filter(d=>d.race_number===currentRace);

filtered.forEach(row=>{

const tr=document.createElement("tr");

["WIN","PLACE","SHOW"].forEach(type=>{

const td=document.createElement("td");

const box=document.createElement("input");

box.type="checkbox";

box.dataset.type=type;
box.dataset.race=row.race_id;
box.dataset.program=row.program_number;
box.dataset.horse=row.horse_name;

box.addEventListener("change",handleWager);

td.appendChild(box);

tr.appendChild(td);

});

headers.forEach(h=>{

if(h==="race_number"||h==="race_id") return;

const td=document.createElement("td");

td.innerText=row[h]||"";

tr.appendChild(td);

});

body.appendChild(tr);

});

}

/* SAVE WAGER */

async function handleWager(){

const tr=this.closest("tr");

if(this.checked){
tr.classList.add("selected");
}else{
tr.classList.remove("selected");
}

const payload={
race_id:this.dataset.race,
program_number:this.dataset.program,
horse_name:this.dataset.horse,
wager:this.dataset.type,
action:this.checked?"add":"delete"
};

updateTicket(payload);

try{

const formData=new FormData();

formData.append("race_id",payload.race_id);
formData.append("program_number",payload.program_number);
formData.append("horse_name",payload.horse_name);
formData.append("wager",payload.wager);
formData.append("action",payload.action);

await fetch(saveURL,{
method:"POST",
body:formData
});

}catch(err){

console.error("Save failed",err);

}

}

/* TICKET */

function updateTicket(payload){

if(payload.action==="add"){
ticket.push(payload);
}

if(payload.action==="delete"){

ticket=ticket.filter(t=>

!(t.race_id===payload.race_id &&
t.program_number===payload.program_number &&
t.wager===payload.wager)

);

}

renderTicket();

}

function renderTicket(){

const div=document.getElementById("ticket");

div.innerHTML="";

ticket.forEach(t=>{

const row=document.createElement("div");

row.innerText=`Race ${t.race_id} - #${t.program_number} ${t.horse_name} : ${t.wager}`;

div.appendChild(row);

});

}

loadSheet();
loadBalance();

</script>

</body>

</html>
