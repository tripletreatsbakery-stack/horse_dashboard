<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Wager Dashboard</title>\n</head>\n<body>\n    <h1>Wager Dashboard</h1>\n    <label for="raceSelector">Select Race:</label>\n    <select id="raceSelector">\n        <option value="">--Select Race--</option>\n        <option value="race1">Race 1</option>\n        <option value="race2">Race 2</option>\n    </select>\n    <br>\n    <table id="horseData">\n        <thead>\n            <tr>\n                <th>Horse</th>\n                <th>Wager</th>\n            </tr>\n        </thead>\n        <tbody>\n            <tr>\n                <td>Horse A</td>\n                <td><input type="checkbox" name="wager" value="horseA"> Place Wager</td>\n            </tr>\n            <tr>\n                <td>Horse B</td>\n                <td><input type="checkbox" name="wager" value="horseB"> Place Wager</td>\n            </tr>\n        </tbody>\n    </table>\n    <br>\n    <button id="saveWagers">Save Wagers</button>\n    <script>\n        document.getElementById('saveWagers').onclick = function() {\n            const race = document.getElementById('raceSelector').value;\n            const wagers = Array.from(document.querySelectorAll('input[name="wager"]:checked')).map(el => el.value);\n            fetch('https://script.google.com/macros/s/AKfycbzAqAH69rI7JqyvmFlkmpjixQRO4h9xht8kzgmAWyHNm33UA9Y4CadJ6qEf77sKp2Co/exec', {\n                method: 'POST',\n                body: JSON.stringify({ race: race, wagers: wagers }),\n                headers: { 'Content-Type': 'application/json' }\n            })\n            .then(response => response.json())\n            .then(data => alert('Wagers saved successfully!'))\n            .catch(error => console.error('Error:', error));\n        };\n    <\/script>\n</body>\n</html>","message":"Updated index.html to include complete wager dashboard with Google Apps Script integration.","owner":"tripletreatsbakery-stack","path":"index.html","repo":"horse_dashboard"}","sha":"3c756b89904fc83a849ff6c1fd0e1543c3e01d8e"}
