<!DOCTYPE html>
<html>
<head>
    <title>Wager Dashboard</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
    <h1>Wager Dashboard</h1>
    <select id="race-selector">
        <option value="">Select a race</option>
        <!-- Race options will be loaded here from Google Sheets -->
    </select>
    <table id="horse-data-table">
        <thead>
            <tr>
                <th>Horse Name</th>
                <th>Odds</th>
                <th>Wager (Win)</th>
                <th>Wager (Place)</th>
                <th>Wager (Show)</th>
            </tr>
        </thead>
        <tbody>
            <!-- Horse data will be populated here -->
        </tbody>
    </table>
    <script>
        // Load horse data from Google Sheets CSV
        function loadHorseData() {
            $.get('https://docs.google.com/spreadsheets/d/e/{YOUR_SHEET_ID}/pub?output=csv', function(data) {
                const rows = data.split('\n');
                rows.forEach((row, index) => {
                    if (index !== 0) { // Skip header row
                        const columns = row.split(',');
                        const horseName = columns[0];
                        const odds = columns[1];
                        $('#horse-data-table tbody').append(`<tr>
                            <td>${horseName}</td>
                            <td>${odds}</td>
                            <td><input type='checkbox' class='wager' data-type='win'></td>
                            <td><input type='checkbox' class='wager' data-type='place'></td>
                            <td><input type='checkbox' class='wager' data-type='show'></td>
                        </tr>`);
                    }
                });
            });
        }

        $(document).ready(function() {
            loadHorseData();

            // Highlight selected rows
            $(document).on('change', '.wager', function() {
                const row = $(this).closest('tr');
                if ($(this).is(':checked')) {
                    row.addClass('highlighted');
                } else {
                    row.removeClass('highlighted');
                }
            });

            // Save wagers to Google Sheets
            $('#save-wagers').click(function() {
                const wagers = [];
                $('#horse-data-table tbody tr').each(function() {
                    const horseName = $(this).find('td:first').text();
                    const winChecked = $(this).find('input[data-type="win"]').is(':checked');
                    const placeChecked = $(this).find('input[data-type="place"]').is(':checked');
                    const showChecked = $(this).find('input[data-type="show"]').is(':checked');
                    if (winChecked || placeChecked || showChecked) {
                        wagers.push({ horseName, win: winChecked, place: placeChecked, show: showChecked });
                    }
                });
                $.ajax({
                    url: 'https://script.google.com/macros/s/AKfycbzAqAH69rI7JqyvmFlkmpjixQRO4h9xht8kzgmAWyHNm33UA9Y4CadJ6qEf77sKp2Co/exec',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(wagers),
                    success: function(response) {
                        alert('Wagers saved successfully!');
                    },
                    error: function(error) {
                        alert('Error saving wagers!');
                    }
                });
            });
        });
    </script>
    <style>
        .highlighted {
            background-color: yellow;
        }
    </style>
</body>
</html>
