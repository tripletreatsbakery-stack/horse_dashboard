<!DOCTYPE html>
<html>

<head>

<title>Horse Wager Dashboard</title>

<style>

body{
font-family:Arial;
margin:20px;
background-image:url("https://images.unsplash.com/photo-1508098682722-e99c643e7f0b");
background-size:cover;
background-attachment:fixed;
background-position:center;
color:white;
}

/* Add dark overlay so text stays readable */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,40,0,0.65);
z-index:0;
}

body > * {
position:relative;
z-index:1;
}

h2{
margin-bottom:10px;
color:#FFD700;
}

/* Dropdown */

select{
padding:6px;
margin-bottom:15px;
background:#0b3d0b;
color:white;
border:1px solid #FFD700;
}

/* Table */

table{
border-collapse:collapse;
width:100%;
background:rgba(255,255,255,0.95);
color:black;
border-radius:6px;
overflow:hidden;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#0b3d0b;
color:#FFD700;
cursor:pointer;
}

tr:hover{
background:#eef6ff;
}

/* Selected horse */

.selected{
background:#c8f7c5 !important;
font-weight:bold;
}

/* Ticket */

.ticket{
margin-top:20px;
padding:12px;
background:rgba(255,255,255,0.95);
color:black;
border-radius:6px;
border-left:6px solid #FFD700;
}

.ticket h3{
margin-top:0;
}

</style>
</head>

<body>

<h2>Wager Dashboard</h2>

<select id="raceSelector"></select>

<table id="table">

<thead>
<tr id="header"></tr>
</thead>

<tbody id="body"></tbody>

</table>

<div class="ticket">

<h3>Bet Ticket</h3>

<div id="ticket"></div>

</div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQFTzUi9G0XRrPHJNSAoN7y6Ik5rQe21n9QUjjU-xkBxJw1IGJJ7nIGUnSTLPJnkbUrQ2jZVGLHGfWo/pub?output=csv";

const saveURL =
"https://script.google.com/macros/s/AKfycbzNV1ga5VDm5iRGjwC4PrSoU9uPBmlvRhzAm8G3xIuFbhQIKSnlcsN57sepmw49mALC/exec";
  
let data=[];
let headers=[];
let currentRace="";
let ticket=[];

async function loadSheet(){

const res=await fetch(sheetURL);
const text=await res.text();

const rows=text.trim().split("\n");

headers=rows[0].split(",");

rows.slice(1).forEach(r=>{

const cols=r.split(",");

let obj={};

headers.forEach((h,i)=>{
obj[h]=cols[i];
});

data.push(obj);

});

populateRaceSelector();
buildHeader();

}

function populateRaceSelector(){

const races=[...new Set(data.map(d=>d.race_number))].sort();

const sel=document.getElementById("raceSelector");

races.forEach(r=>{

const opt=document.createElement("option");

opt.value=r;
opt.text="Race "+r;

sel.appendChild(opt);

});

sel.addEventListener("change",()=>{

currentRace=sel.value;
renderTable();

});

currentRace=races[0];
sel.value=currentRace;

renderTable();

}

function buildHeader(){

const head=document.getElementById("header");

head.innerHTML="<th>W</th><th>P</th><th>S</th>";

headers.forEach(h=>{

if(h==="race_number") return;

const th=document.createElement("th");

th.innerText=h;

head.appendChild(th);

});

}

function renderTable(){

const body=document.getElementById("body");

body.innerHTML="";

const filtered=data.filter(d=>d.race_number===currentRace);

filtered.forEach(row=>{

const tr=document.createElement("tr");

["WIN","PLACE","SHOW"].forEach(type=>{

const td=document.createElement("td");

const box=document.createElement("input");

box.type="checkbox";

box.dataset.type = type;
box.dataset.race = row.race_id;
box.dataset.program = row.program_number;
box.dataset.horse = row.horse_name;

box.addEventListener("change",handleWager);

td.appendChild(box);

tr.appendChild(td);

});

headers.forEach(h=>{

if(h==="race_number") return;

const td=document.createElement("td");

td.innerText=row[h]||"";

tr.appendChild(td);

});

body.appendChild(tr);

});

}

async function handleWager(){

const tr=this.closest("tr");

if(this.checked){
tr.classList.add("selected");
}else{
tr.classList.remove("selected");
}

const payload={

race_id:this.dataset.race,
program_number:this.dataset.program,
horse_name:this.dataset.horse,
wager:this.dataset.type,
action:this.checked ? "add" : "delete"

};

updateTicket(payload);

try{

const formData = new FormData();

formData.append("race_id",payload.race_id);
formData.append("program_number",payload.program_number);
formData.append("horse_name",payload.horse_name);
formData.append("wager",payload.wager);
formData.append("action",payload.action);

const res=await fetch(saveURL,{
method:"POST",
body:formData
});

const result=await res.text();

console.log("Saved",result);

}catch(err){

console.error("Save failed",err);

}

}

function updateTicket(payload){

if(payload.action==="add"){

ticket.push(payload);

}

if(payload.action==="delete"){

ticket=ticket.filter(t=>

!(t.race_id===payload.race_id &&
t.program_number===payload.program_number &&
t.wager===payload.wager)

);

}

renderTicket();

}

function renderTicket(){

const div=document.getElementById("ticket");

div.innerHTML="";

ticket.forEach(t=>{

const row=document.createElement("div");

row.innerText=`Race ${t.race_id} - #${t.program_number} ${t.horse_name} : ${t.wager}`;

div.appendChild(row);

});

}

loadSheet();

</script>

</body>

</html>
