<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Horse Wagers</title>

<style>

body{
font-family: Arial;
margin:20px;
background:#f5f5f5;
}

h2{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

</style>

</head>

<body>

<h2>Wager Dashboard</h2>

<table id="table">
<thead>
<tr id="header"></tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1rEU82uodMm3MbUmbgBGJQrAnsKJwD86A2gPVtMzhOdU/export?format=csv&gid=0";

async function loadSheet(){

const response = await fetch(sheetURL);
const text = await response.text();

const rows = text.trim().split("\n");
const headers = rows[0].split(",");

const headerRow = document.getElementById("header");

headers.forEach(h=>{
const th=document.createElement("th");
th.innerText=h;
headerRow.appendChild(th);
});

const body = document.getElementById("body");

rows.slice(1).forEach(r=>{

const cols = r.split(",");
const tr=document.createElement("tr");

cols.forEach(c=>{
const td=document.createElement("td");
td.innerText=c;
tr.appendChild(td);
});

body.appendChild(tr);

});

}

loadSheet();

</script>

</body>
</html>
